name = "codecrafters_{{course_slug_underscorized}}"
description = "Starter code for the {{course_name}} challenge"
version = "0.1.0-dev"

authors = ["Codecrafters <hello@codecrafters.io>"]
maintainers = ["Codecrafters <hello@codecrafters.io>"]
maintainers-logins = ["codecrafters-io"]
licenses = "MIT"
website = "https://codecrafters.io"

[[depends-on]]
[depends-on.'case(distribution)'.'debian|ubuntu']
gnat_external = "*"
gprbuild = "*"

[depends-on.'case(distribution)'.'...']
gnat_native = "*"
gprbuild = "*"

executables = ["main"]
project-files = ["codecrafters_{{course_slug_underscorized}}.gpr"]
